<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <main class="calculadoraContenedor">
        <section>
            <h1 class="titulo">Calculadora de descuentos encadenados</h1>
            <h4 class="subtitulo">Ingrese el precio original y uno o mas descuentos</h4>
        
            <div class="formulario">
                <div class="carta">
                    <label>Precio original</label>
                    <input type="number" id="precio" placeholder="Ingrese el precio original">
                </div>
                <div class="carta">
                    <label>Descuento %</label>
                    <input type="number" id="descuento" placeholder="Ingrese el descuento en porcentaje">
                </div>
                <div class="botones">
                    <button id="BTNcalcular">Calcular</button>
                    <button id="BTNlimpiar">Limpiar</button>
                </div>
            </div>
            <div div class="resultados">
                <p>precio final: <span id="Final"></span>$-</p>
                <p>Ahorro total: <span id="Ahorro"></span>$-</p>
            </div>
        </section>
    </main>
    
</body>
</html>
